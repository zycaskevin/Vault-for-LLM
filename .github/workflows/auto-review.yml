name: Vault CI

on:
  push:
    paths:
      - 'raw/**'
      - 'vault/**'
      - 'scripts/**'
      - 'tests/**'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'raw/**'
      - 'vault/**'
      - 'scripts/**'
      - 'tests/**'

jobs:
  lint-knowledge:
    name: Lint raw/ knowledge files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet pyyaml

      - name: Lint YAML frontmatter
        run: |
          echo "🔍 Linting raw/ knowledge files..."
          ERRORS=0
          shopt -s globstar nullglob
          for f in raw/**/*.md raw/*.md; do
            [ -f "$f" ] || continue
            if ! head -1 "$f" | grep -q '^---'; then
              echo "❌ $f: missing YAML frontmatter"
              ERRORS=$((ERRORS + 1))
              continue
            fi
            for field in title category; do
              if ! grep -q "^${field}:" "$f"; then
                echo "⚠️  $f: missing '$field' in frontmatter"
                ERRORS=$((ERRORS + 1))
              fi
            done
            TITLE=$(grep '^title:' "$f" | head -1 | sed 's/title: *//' | tr -d '"')
            if [ ${#TITLE} -gt 100 ]; then
              echo "⚠️  $f: title too long (${#TITLE} chars)"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "❌ Found $ERRORS issue(s)"
            exit 1
          else
            echo "✅ All knowledge files pass lint"
          fi

      - name: Check duplicate titles
        run: |
          DUPES=$(grep -rh '^title:' raw/ 2>/dev/null | sed 's/title: *//' | tr -d '"' | sort | uniq -d)
          if [ -n "$DUPES" ]; then
            echo "⚠️  Duplicate titles found:"
            echo "$DUPES"
          else
            echo "✅ No duplicate titles"
          fi

      - name: Knowledge stats
        run: |
          echo "📊 Knowledge stats:"
          RAW=$(find raw/ -name '*.md' -type f 2>/dev/null | wc -l)
          L0=$(find L0-identity/ -name '*.md' -type f 2>/dev/null | wc -l)
          L1=$(find L1-core-facts/ -name '*.md' -type f 2>/dev/null | wc -l)
          L2=$(find L2-context/ -name '*.md' -type f 2>/dev/null | wc -l)
          echo "  raw/: $RAW  L0: $L0  L1: $L1  L2: $L2  Total: $((RAW+L0+L1+L2))"

  test:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"
      - run: pytest tests/test_lite.py -v

  security-check:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for hardcoded credentials
        run: |
          FOUND=0
          if grep -rn 'eyJ[A-Za-z0-9_-]\{50,\}' --include="*.py" --include="*.ts" --include="*.js" . 2>/dev/null | grep -v ".git/"; then
            echo "❌ Possible hardcoded JWT token!"
            FOUND=1
          fi
          if grep -rn 'sk-[A-Za-z0-9]\{20,\}' --include="*.py" . 2>/dev/null | grep -v ".git/"; then
            echo "❌ Possible API key!"
            FOUND=1
          fi
          [ $FOUND -eq 0 ] && echo "✅ No hardcoded credentials" || exit 1
