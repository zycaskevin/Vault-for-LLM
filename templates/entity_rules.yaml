  - ollama
  - sqlite
  - sqlite-vec
  - onnx
  - onnxruntime
  - python
  - conda
  - docker
  - ffmpeg
  - supabase
  - chromadb
  - vllm
  - langchain
  - llamaindex
  - git
  - github
  - n8n
  - redis
  - fastapi
  - letta
  - cursor
  - claude code

