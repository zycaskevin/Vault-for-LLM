# entity_rules.yaml
# Vault for LLM — 實體推斷規則
#
# 格式：
#   entity_type:
#     - keyword1
#     - keyword2
#
# 規則：文字（title + tags + content）包含 keyword 時，自動建立對應實體並連結。
# 建議：每次擴展新 domain 時，在對應分類加入關鍵詞。
# 大小寫不敏感（系統會統一轉小寫比對）。

# ── AI / 技術工具 ─────────────────────────────────────────
