# entity_rules.yaml
# Vault-for-LLM — public-safe starter entity inference rules
#
# Copy this file into your project root as `entity_rules.yaml` and customize it
# for your own domain. The repository template intentionally stays generic:
# it should not ship a maintainer's private customer, clinic, product, or
# operational vocabulary as the default behavior.
#
# Format:
#   entity_type:
#     - keyword1
#     - keyword2
#
# Rules: when a knowledge entry's title + tags + content contains a keyword,
# Vault can infer the entity and link it to that entry. Matching is
# case-insensitive.

# Generic AI / developer-tool vocabulary. Keep this list short so fresh users
# can see the shape without inheriting a domain-specific taxonomy.
tool:
  - sqlite
  - sqlite-vec
  - python
  - docker
  - git
  - github
  - ollama
  - mcp

concept:
  - agent
  - rag
  - vector
  - embedding
  - citation
  - workflow
  - automation
  - knowledge base

platform:
  - linux
  - macos
  - windows
  - wsl

# Add your own domain sections below or copy an example from examples/.
# Example:
# product:
#   - onboarding
#   - billing
#   - support
